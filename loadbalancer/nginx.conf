# Primary VPS and Laptop load balancing
upstream antarkanma_backend {
    # VPS server configuration
    server app:8000 backup;  # VPS as backup server for GET requests
    
    # Laptop server configuration
    server loc.antarkanmaa.my.id max_fails=3 fail_timeout=10s;  # Laptop as primary for GET requests

    keepalive 32;  # Keep connections alive
}

# Separate upstream for write operations (POST/PUT/DELETE/PATCH)
upstream vps_backend {
    server app:8000;
    keepalive 32;
}

# Enable debug logging
error_log /var/log/nginx/error.log debug;
access_log /var/log/nginx/access.log combined buffer=512k flush=1m;

server {
    listen 80;
    server_name dev.antarkanmaa.my.id;

    # Add debug headers
    add_header X-Debug-Request-Method $request_method;
    add_header X-Debug-Upstream $upstream_addr;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","server":"load-balancer","timestamp":$time_iso8601}';
    }

    # Handle API routes specifically
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Route based on request method
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://vps_backend; # Write operations to VPS
        }
        if ($request_method = GET) {
            proxy_pass http://antarkanma_backend; # GET requests to laptop first, VPS backup
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }
        
        # Enhanced timeouts for API requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Error handling for API
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @api_fallback;
    }

    # Main location block
    location / {
        proxy_pass http://antarkanma_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Route write operations to VPS only
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://vps_backend; # Write operations always to VPS
        }

        # GET requests go to laptop first, fallback to VPS
        if ($request_method = GET) {
            proxy_pass http://antarkanma_backend;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }
        if ($uri ~* ^/(admin|filament)) {
            proxy_pass http://app:8000; # Admin routes to VPS
        }
        if ($http_x_priority = "high") {
            proxy_pass http://app:8000; # Priority requests to VPS
        }

        # Enhanced proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Retry non-idempotent requests
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # API fallback location
    location @api_fallback {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Shorter timeouts for fallback
        proxy_connect_timeout 10s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
    }

    # Advanced health check endpoint with more details
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{
            "status": "healthy",
            "server": "load-balancer",
            "get_requests": {
                "primary": "laptop",
                "backup": "vps"
            },
            "write_requests": {
                "server": "vps"
            },
            "timestamp": "$time_iso8601",
            "uptime": "$uptime_sec"
        }';
    }

    # Improved fallback mechanism
    error_page 502 503 504 = @fallback;

    location @fallback {
        # Route based on request method
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://vps_backend;
        }
        if ($request_method = GET) {
            proxy_pass http://antarkanma_backend;
        }
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Shorter timeouts for fallback
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
