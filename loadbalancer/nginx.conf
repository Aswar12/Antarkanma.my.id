# Primary VPS and Laptop load balancing
upstream antarkanma_backend {
    # Health check for VPS server
    server app:8000 weight=3 max_fails=3 fail_timeout=30s;        # VPS as primary server (60%)
    server loc.antarkanmaa.my.id weight=2;  # Laptop as secondary server (40%)

    keepalive 32;  # Keep connections alive
}

server {
    listen 80;
    server_name dev.antarkanmaa.my.id;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Active health checks
    location /health_check {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","server":"load-balancer","timestamp":$time_iso8601}';
    }

    location / {
        proxy_pass http://antarkanma_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Route specific traffic to VPS only
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://app:8000; # Write operations to VPS
        }
        if ($uri ~* ^/(admin|filament)) {
            proxy_pass http://app:8000; # Admin routes to VPS
        }
        if ($http_x_priority = "high") {
            proxy_pass http://app:8000; # Priority requests to VPS
        }

        # Enhanced proxy timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Retry non-idempotent requests
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Advanced health check endpoint with more details
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{
            "status": "healthy",
            "server": "load-balancer",
            "primary": "vps",
            "secondary": "laptop",
            "vps_weight": "60",
            "laptop_weight": "40",
            "timestamp": "$time_iso8601",
            "uptime": "$uptime_sec"
        }';
    }

    # Improved fallback mechanism
    error_page 502 503 504 = @fallback;

    location @fallback {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Shorter timeouts for fallback
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
