# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Authentication
requirepass ${REDIS_PASSWORD}
masterauth ${REDIS_PASSWORD}

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Replication
replica-serve-stale-data yes
replica-read-only yes

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile "/data/redis.log"
