# Define separate upstreams for different types of traffic
upstream backend_vps {
    server 127.0.0.1:8000;    # VPS utama
    keepalive 32;
}

upstream backend_laptop {
    server loc.antarkanmaa.my.id:443;  # Laptop (via Cloudflare Tunnel)
    keepalive 32;
}

# DNS resolver for Cloudflare Tunnel
resolver 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 5s;

server {
    listen 80;
    server_name dev.antarkanmaa.my.id;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Admin routes always go to VPS
    location /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Filament admin routes always go to VPS
    location /filament {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # API endpoints
    location /api/ {
        # Enable SSL for upstream HTTPS connection
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;

        # Route based on server parameter
        if ($arg_server = "laptop") {
            proxy_pass https://loc.antarkanmaa.my.id:443;
            break;
        }
        if ($arg_server = "vps") {
            proxy_pass http://127.0.0.1:8000;
            break;
        }

        # All non-GET requests go to VPS
        if ($request_method !~ ^GET$) {
            proxy_pass http://127.0.0.1:8000;
            break;
        }

        # GET requests go to laptop
        proxy_set_header Host loc.antarkanmaa.my.id;
        proxy_pass https://loc.antarkanmaa.my.id:443;
    }

    # All other requests go to VPS
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Enhanced health check endpoint
    location = /health {
        access_log off;
        return 200 '{"status":"healthy","server":"load-balancer","primary":"vps","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fallback if laptop server down
    error_page 502 504 = @fallback;

    location @fallback {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
