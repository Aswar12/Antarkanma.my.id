# Primary VPS and Laptop load balancing
upstream antarkanma_backend {
    server app:8000 weight=3;        # VPS sebagai server utama (75%)
    server loc.antarkanmaa.my.id weight=1;  # Laptop sebagai server booster (25%)
}

server {
    listen 80;
    server_name dev.antarkanmaa.my.id;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://antarkanma_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Route specific traffic to VPS only
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://app:8000; # Write operations to VPS
        }
        if ($uri ~* ^/(admin|filament)) {
            proxy_pass http://app:8000; # Admin routes to VPS
        }
        if ($http_x_priority = "high") {
            proxy_pass http://app:8000; # Priority requests to VPS
        }

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Simple health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy""server":"load-balancer""primary":"vps"}';
        add_header Content-Type application/json;
    }

    # Fallback if laptop server is down
    error_page 502 504 = @fallback;

    location @fallback {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
