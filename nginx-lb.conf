upstream antarkanma_backend {
    server localhost:8000 weight=6;         # VPS dengan weight 60%
    server antarkanmaa.my.id weight=4;      # Laptop dengan weight 40%
}

# Health check untuk backend servers
match health_check {
    status 200;
    header content-type = application/json;
}

server {
    listen 80;
    server_name dev.antarkanmaa.my.id;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://antarkanma_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Health checks
        health_check uri=/api/health match=health_check interval=5s fails=3 passes=2;

        # Write operations to VPS only
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH)$) {
            proxy_pass http://localhost:8000;
        }

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","server":"load-balancer"}';
        add_header Content-Type application/json;
    }
}
